name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        run: zig build

      - name: Test
        run: zig build test

      - name: zig-ecs adapter tests
        run: cd ecs/zig-ecs && zig build test

      - name: Verify binary
        run: |
          ./zig-out/bin/labelle-assembler --protocol-version
          ./zig-out/bin/labelle-assembler --help
