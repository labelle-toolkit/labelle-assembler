name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install sokol system libs (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libgl1-mesa-dev libx11-dev libxi-dev libxcursor-dev

      - name: Build
        run: zig build

      - name: Test
        run: zig build test

      - name: zig-ecs adapter tests
        run: cd ecs/zig-ecs && zig build test

      - name: SDL backend build-helper tests
        run: cd backends/sdl && zig build test

      - name: sokol backend unit tests + audio.zig compile-check
        run: cd backends/sokol && zig build test

      - name: wgpu backend WAV parser tests
        run: cd backends/wgpu && zig build test

      # Linux-only: raylib-zig transitively pulls hexops/xcode-frameworks
      # via `git+https://`, which Zig's git fetcher can't resolve on the
      # macos-latest runner ("unable to discover remote git server
      # capabilities: ProtocolError"). The slot_alloc tests are pure Zig
      # with no platform-specific behaviour, so running them on the
      # ubuntu runner alone is enough.
      - name: raylib backend slot-allocator tests
        if: runner.os == 'Linux'
        run: cd backends/raylib && zig build test

      - name: plugins/debug tests
        run: cd plugins/debug && zig build test

      - name: bgfx backend tests + cross-compile compile-check
        run: |
          cd backends/bgfx
          zig build test
          zig build test -Dtarget=x86_64-linux-gnu
          zig build test -Dtarget=x86_64-windows-gnu
          zig build test -Dtarget=x86_64-macos
          zig build test -Dtarget=aarch64-macos

      - name: Verify binary
        run: |
          ./zig-out/bin/labelle-assembler --protocol-version
          ./zig-out/bin/labelle-assembler --help

  # End-to-end usage test: check out every sibling repo the examples
  # need (labelle-cli for the binary, labelle-core/engine/gfx for the
  # runtime packages), then `labelle generate` and `zig build` the
  # raylib example. Validates that the assembler + backends +
  # zig-ecs + deps_linker pipeline produces a project that actually
  # compiles, not just resolves paths.
  #
  # Linux only for now — raylib-zig's transitive hexops/xcode-frameworks
  # dep doesn't fetch cleanly from the macos GitHub runner (see the
  # slot-allocator gate above for context).
  examples-integration:
    name: Examples integration test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout labelle-assembler
        uses: actions/checkout@v4
        with:
          path: labelle-assembler

      - uses: actions/checkout@v4
        with:
          repository: labelle-toolkit/labelle-cli
          path: labelle-cli

      - uses: actions/checkout@v4
        with:
          repository: labelle-toolkit/labelle-core
          path: labelle-core

      - uses: actions/checkout@v4
        with:
          repository: labelle-toolkit/labelle-engine
          path: labelle-engine

      - uses: actions/checkout@v4
        with:
          repository: labelle-toolkit/labelle-gfx
          path: labelle-gfx

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install raylib + sokol system libs
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev libx11-dev libxcursor-dev libxrandr-dev \
            libxinerama-dev libxi-dev libxext-dev libxfixes-dev \
            libwayland-dev libxkbcommon-dev libasound2-dev

      - name: Build labelle-assembler
        run: cd labelle-assembler && zig build

      - name: Build labelle-cli
        run: cd labelle-cli && zig build

      - name: Generate + build the raylib example
        env:
          LABELLE_ASSEMBLER: ${{ github.workspace }}/labelle-assembler/zig-out/bin/labelle-assembler
        run: |
          cd labelle-assembler/examples/raylib
          $GITHUB_WORKSPACE/labelle-cli/zig-out/bin/labelle generate
          cd .labelle/raylib_desktop
          zig build

      # Smoke test for the Asset Streaming RFC (labelle-assembler#55,
      # labelle-engine#437). Same recipe as the raylib example above —
      # build-only, not a headless runtime check. Runtime exercise
      # requires a display (raylib creates its GL context at init);
      # local `labelle run --timeout=Ns` covers the render path.
      - name: Generate + build the asset-streaming-smoke example
        env:
          LABELLE_ASSEMBLER: ${{ github.workspace }}/labelle-assembler/zig-out/bin/labelle-assembler
        run: |
          cd labelle-assembler/examples/asset-streaming-smoke
          $GITHUB_WORKSPACE/labelle-cli/zig-out/bin/labelle generate
          cd .labelle/raylib_desktop
          zig build

      # End-to-end test for PR #73's plugin-Controller machinery
      # (RFC-plugin-controllers §1–§2). Unlike the build-only examples
      # above, this step also RUNS the binary and asserts the log output
      # matches a canonical `setup` → interleaved `game-tick` /
      # `plugin-tick` sequence. Catches "generated code compiles but
      # doesn't behave" regressions that snapshot tests in tests.zig
      # can't — e.g. PluginControllers.setup silently skipped, or
      # plugin-shipped scripts copied but never dispatched.
      #
      # Why xvfb: raylib creates an OpenGL context at init even with
      # `.hidden = true`, and on headless Linux runners the context
      # requires a display server. xvfb-run provides the minimal X
      # server the GL context needs. macOS CI would work without xvfb
      # but raylib-zig's transitive deps don't fetch cleanly there (see
      # the slot-allocator gate earlier in this file).
      #
      # Why `timeout 3`: raylib's main loop polls
      # `window.windowShouldClose()`, which can't flip on a hidden
      # window. The example caps its log output at FRAMES_BEFORE_QUIT
      # ticks (silent past that point); `timeout` is what actually
      # kills the process.
      - name: Generate + build the plugin-controllers example
        env:
          LABELLE_ASSEMBLER: ${{ github.workspace }}/labelle-assembler/zig-out/bin/labelle-assembler
        run: |
          cd labelle-assembler/examples/plugin-controllers
          $GITHUB_WORKSPACE/labelle-cli/zig-out/bin/labelle generate
          cd .labelle/raylib_desktop
          zig build

      - name: Install xvfb for the plugin-controllers runtime check
        run: sudo apt-get install -y xvfb

      - name: Runtime log-order check for plugin-controllers
        run: |
          cd labelle-assembler/examples/plugin-controllers/.labelle/raylib_desktop

          # Run headlessly. `timeout` exits 124 when it sends SIGTERM,
          # which is the expected path (see the preceding step's comment
          # on raylib's loop guard). Tolerate both 0 (clean `game.quit()`
          # on sokol-style ports) and 124 (timeout kill).
          set +e
          xvfb-run -a -s "-screen 0 320x240x24" \
            timeout 3 ./zig-out/bin/game > run.log 2>&1
          RC=$?
          set -e
          if [ $RC -ne 0 ] && [ $RC -ne 124 ]; then
            echo "E: binary exited with unexpected code $RC"
            echo "--- captured output ---"
            cat run.log
            exit 1
          fi

          # Extract only the tagged lifecycle events we care about.
          # Drops raylib banner, log timestamps, and log level prefix.
          grep -oE '\[(demo-plugin|game)\] [a-z-]+( frame=[0-9]+)?' run.log > actual.txt || true

          # Canonical sequence — see `examples/plugin-controllers/README.md`
          # and the `FRAMES_BEFORE_QUIT = 5` in the two tick scripts.
          cat > expected.txt <<'END'
          [demo-plugin] setup
          [game] game-tick frame=1
          [demo-plugin] plugin-tick frame=1
          [game] game-tick frame=2
          [demo-plugin] plugin-tick frame=2
          [game] game-tick frame=3
          [demo-plugin] plugin-tick frame=3
          [game] game-tick frame=4
          [demo-plugin] plugin-tick frame=4
          [game] game-tick frame=5
          [demo-plugin] plugin-tick frame=5
          END
          # Strip the YAML-block leading indent from the heredoc body.
          sed -i 's/^          //' expected.txt

          if ! diff -u expected.txt actual.txt; then
            echo "E: plugin-controllers log order mismatch"
            echo "--- full captured output ---"
            cat run.log
            exit 1
          fi
          echo "PASS: plugin-controllers lifecycle order matches canonical sequence"
          echo "  ($(wc -l < actual.txt | tr -d ' ') lifecycle events in order)"
